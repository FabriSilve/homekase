services:
  db:
    image: postgres:16-alpine
    container_name: {{APP_NAME}}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: {{APP_NAME}}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/databases/{{APP_NAME}}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - {{APP_NAME}}-net

  api:
    build: ./api
    container_name: {{APP_NAME}}-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/{{APP_NAME}}
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{APP_NAME}}-api.rule=Host(`{{APP_NAME}}.home`) && PathPrefix(`/api`)"
      - "traefik.http.routers.{{APP_NAME}}-api.entrypoints=web"
      - "traefik.http.middlewares.{{APP_NAME}}-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.{{APP_NAME}}-api.middlewares={{APP_NAME}}-strip"
      - "traefik.http.services.{{APP_NAME}}-api.loadbalancer.server.port=3000"
    networks:
      - {{APP_NAME}}-net

  frontend:
    build: ./frontend
    container_name: {{APP_NAME}}-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{APP_NAME}}.rule=Host(`{{APP_NAME}}.home`)"
      - "traefik.http.routers.{{APP_NAME}}.entrypoints=web"
      - "traefik.http.services.{{APP_NAME}}-frontend.loadbalancer.server.port=80"
    networks:
      - {{APP_NAME}}-net

networks:
  {{APP_NAME}}-net:
    name: {{APP_NAME}}-net
    driver: bridge
