name: Deploy to homekase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: homelab
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Deploy services
        run: docker compose up -d

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:3000/health || exit 1
