services:
  ollama:
    image: ollama/ollama:latest
    container_name: assistant-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-12g}
          cpus: "${OLLAMA_CPU_LIMIT:-4}"
        reservations:
          memory: ${OLLAMA_MEM_RESERVATION:-4g}
    networks:
      - assistant-net

  searxng:
    image: searxng/searxng:latest
    container_name: assistant-searxng
    restart: unless-stopped
    volumes:
      - searxng-data:/etc/searxng
      - ${SEARXNG_SETTINGS:-/dev/null}:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 128m
    networks:
      - assistant-net

  agent:
    build: ./agent
    container_name: assistant-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - SEARXNG_URL=http://searxng:8888
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1"
        reservations:
          memory: 128m
    depends_on:
      - ollama
      - searxng
    networks:
      - assistant-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: assistant-open-webui
    restart: unless-stopped
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://agent:8000/v1
      - OPENAI_API_KEY=not-needed
      - WEBUI_NAME=Homekase Assistant
      - WEBUI_URL=http://localhost:${PORT:-3000}
      - DEFAULT_MODELS=${OLLAMA_MODEL:-}
    labels:
      - "com.homekase.service=assistant"
      - "com.homekase.port=${PORT:-3000}"
      - "com.homekase.tailscale=${TS:-false}"
    ports:
      - "${BIND_ADDR}${PORT:-3000}:8080"
    depends_on:
      - agent
    networks:
      - assistant-net

volumes:
  ollama-data:
  searxng-data:
  open-webui-data:

networks:
  assistant-net:
    driver: bridge
