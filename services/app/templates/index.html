<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homekase</title>
  <meta name="theme-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Homekase">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/static/icon-512.png">
  <link rel="manifest" href="/static/manifest.json">
  <script src="https://unpkg.com/htmx.org@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --bg-primary: #0a0e17;
      --bg-card: #0d1525;
      --bg-card-hover: #111d33;
      --accent-cyan: #00f0ff;
      --accent-green: #00ff88;
      --accent-blue: #4488ff;
      --accent-red: #ff4466;
      --text-primary: #e0e8f0;
      --text-muted: #5a6a7a;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent-cyan);
      margin-bottom: 1.5rem;
    }

    .header {
      margin-bottom: 2rem;
    }

    .footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(0, 240, 255, 0.1);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.875rem;
    }

    .card-port {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .card-status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
    }

    .card-icons {
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }

    .icon-dot {
      font-size: 0.875rem;
    }

    .icon-lock {
      font-size: 0.75rem;
    }

    .icon-exposed {
      filter: hue-rotate(60deg) saturate(2);
    }

    .icon-secure {
      filter: none;
    }

    .card-status {
      font-size: 0.75rem;
    }

    .status-running { color: var(--accent-green); }
    .status-exited  { color: var(--accent-red); }
    .status-default { color: var(--text-muted); }

    .card {
      background: var(--bg-card);
      border: 1px solid rgba(0, 240, 255, 0.1);
      border-radius: 0.5rem;
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: rgba(0, 240, 255, 0.3);
      background: var(--bg-card-hover);
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .btn {
      background: var(--bg-card);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 0.375rem;
      padding: 0.5rem 1rem;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn:hover {
      border-color: var(--accent-cyan);
      background: var(--bg-card-hover);
    }

    .btn-danger {
      border-color: rgba(255, 68, 102, 0.3);
    }

    .btn-danger:hover {
      border-color: var(--accent-red);
    }

    .services-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-bar {
      display: flex;
      gap: 0.35rem;
    }

    .toggle {
      background: var(--bg-card);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 0.375rem;
      padding: 0.3rem 0.6rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .toggle:hover {
      border-color: rgba(0, 240, 255, 0.4);
      color: var(--text-primary);
    }

    .toggle.toggle-active {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      background: rgba(0, 240, 255, 0.08);
    }

    .output {
      background: #000;
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 0.5rem;
      padding: 1rem;
      font-size: 0.75rem;
      line-height: 1.5;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .terminal-input {
      background: #000;
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 0.375rem;
      padding: 0.5rem;
      color: var(--accent-cyan);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      outline: none;
    }

    .terminal-input:focus {
      border-color: var(--accent-cyan);
    }

    .lock-section {
      text-align: center;
      padding: 4rem 1rem;
    }

    .lock-btn {
      background: none;
      border: none;
      font-size: 4rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .lock-btn:hover {
      opacity: 1;
    }

    .unlock-form {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⟐ Homekase</h1>
  </div>

  <div class="section-title services-header">
    <span>Services</span>
    <div class="toggle-bar">
      <button class="toggle toggle-active" data-mode="none" title="Open service">↗ Open</button>
      <button class="toggle" data-mode="pause-resume" title="Pause / Resume">⏸ Pause/Resume</button>
      <button class="toggle" data-mode="expose-unexpose" title="Expose / Unexpose">🔒 Expose/Unexpose</button>
    </div>
  </div>
  {{ service_grid|safe }}

  {% if dashboard_password and not session_valid %}
  <div class="lock-section" id="actions-section">
    <button class="lock-btn" id="lock-btn"
            hx-get="/api/lock-form" hx-target="#actions-section" hx-swap="innerHTML">
      🔒
    </button>
  </div>
  {% else %}
  <div id="actions-section">
    <div class="section-title">Quick Actions</div>
    <div class="actions">
      <button class="btn"
              hx-post="/api/exec"
              hx-vals='{"command": "uptime"}'
              hx-target="#output"
              hx-swap="innerHTML">
        ⚡ Uptime
      </button>
      <button class="btn"
              hx-post="/api/exec"
              hx-vals='{"command": "df -h /"}'
              hx-target="#output"
              hx-swap="innerHTML">
        💾 Disk
      </button>
      <button class="btn"
              hx-post="/api/exec"
              hx-vals='{"command": "free -h"}'
              hx-target="#output"
              hx-swap="innerHTML">
        🧠 Memory
      </button>
      <button class="btn"
              hx-post="/api/exec"
              hx-vals='{"command": "docker ps"}'
              hx-target="#output"
              hx-swap="innerHTML">
        🐳 Docker
      </button>
      <button class="btn btn-danger"
              hx-post="/api/exec"
              hx-vals='{"command": "sudo shutdown -h now"}'
              hx-target="#output"
              hx-swap="innerHTML">
        ⏻ Shutdown
      </button>
      <button class="btn btn-danger"
              hx-post="/api/exec"
              hx-vals='{"command": "sudo reboot"}'
              hx-target="#output"
              hx-swap="innerHTML">
        🔄 Reboot
      </button>
    </div>
    <div class="section-title">Output</div>
    <div class="output" id="output">
      Click a button to run a command.
    </div>
  </div>
  {% endif %}
  <div class="footer">
    {% if tailscale.hostname %}
      {{ tailscale.hostname }}{% if tailscale.domain %}{% endif %}
    {% endif %}
  </div>

  <script>
    document.body.dataset.actionMode = 'none';

    document.addEventListener('click', function(e) {
      var toggle = e.target.closest('.toggle');
      if (toggle) {
        document.querySelectorAll('.toggle').forEach(function(t) { t.classList.remove('toggle-active'); });
        toggle.classList.add('toggle-active');
        document.body.dataset.actionMode = toggle.dataset.mode;
        e.stopPropagation();
        return;
      }

      var card = e.target.closest('.card');
      if (!card) return;

      var mode = document.body.dataset.actionMode || 'none';
      var name = card.dataset.service;
      var status = card.dataset.status;
      var exposed = card.dataset.exposed;
      var url = card.dataset.url;

      if (mode === 'none') {
        if (url && url !== '-') window.open(url, '_blank');
        return;
      }

      var endpoint;
      if (mode === 'pause-resume') {
        endpoint = status === 'running' ? 'pause' : 'resume';
      } else {
        endpoint = exposed === 'true' ? 'unexpose' : 'expose';
      }

      if (typeof htmx !== 'undefined') {
        htmx.ajax('POST', '/api/services/' + encodeURIComponent(name) + '/' + endpoint, {
          target: '#service-grid',
          swap: 'outerHTML'
        });
      }
    });
  </script>
</body>
</html>
