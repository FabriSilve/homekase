<div class="grid" id="service-grid">
  {% for s in services %}
  <div class="card"
       data-service="{{ s.name }}"
       data-status="{{ s.status }}"
       data-url="{{ s.url }}"
       data-exposed="{{ s.exposed }}">
    <div class="card-title-row">
      <span class="card-name">{{ s.name }}</span>
      {% if s.port %}
      <span class="card-port">{{ s.port }}</span>
      {% endif %}
    </div>
    <div class="card-status-row">
      <div class="card-icons">
        <span class="icon-dot status-{{ 'running' if s.status == 'running' else 'exited' if s.status == 'exited' else 'default' }}">●</span>
        {% if s.exposed == "true" %}
        <span class="icon-lock icon-exposed">🔓</span>
        {% else %}
        <span class="icon-lock icon-secure">🔒</span>
        {% endif %}
      </div>
      <span class="card-status status-{{ 'running' if s.status == 'running' else 'exited' if s.status == 'exited' else 'default' }}">{{ s.status }}</span>
    </div>
  </div>
  {% endfor %}
</div>
