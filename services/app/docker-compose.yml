services:
  app:
    build: .
    container_name: homekase-app
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/homekase:/etc/homekase:ro
    environment:
      - HOMEKASE_CONFIG=/etc/homekase/homekase.yml
    ports:
      - "${BIND_ADDR}${PORT:-5000}:8000"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    networks:
      - homelab-net

networks:
  homelab-net:
    external: true
